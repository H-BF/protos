syntax = "proto3";

package common;
option go_package = "github.com/H-BF/protos/pkg/api/common;common";

import "google/protobuf/descriptor.proto";

//Networks: represents network types
message Networks {
  //NetIP: represents IP-Network type (L3)
  message NetIP { 
    //Transport: represents net transport (L4)
    enum Transport {      
      TCP = 0;
      UDP = 1;
    }
    //PortRange: port [from - to] range 
    message PortRange {
      //range left bound
      uint32 from = 1;
      //range right bound 
      uint32 to = 2;
    }
    //CIDR: IP range
    string CIDR = 1;
  }
}

// IP version
enum IPv {
  _ = 0;
  V4 = 1; //IPv4
  V6 = 2; //IPv6
}

// IP/ICMP protocol
message ICMP {
  IPv IPv = 1;
  repeated uint32 Types  = 2; // ICMP message types
}

